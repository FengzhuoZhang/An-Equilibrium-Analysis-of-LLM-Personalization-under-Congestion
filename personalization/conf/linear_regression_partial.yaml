inherit: 
    - base.yaml


model:
    n_dims: 30
    n_positions: 1031

training:
    task: noisy_linear_regression_partial
    batch_size: 64
    learning_rate: 0.0001
    save_every_steps: 1000
    keep_every_steps: 10000
    curriculum:
        points:
            start: 11
            end: 1031
            inc: 10
            interval: 780
        dims:
            start: 5
            end: 30
            inc: 1
            interval: 2000
    decay_factor: 0.0
    train_steps: 100001

task:
    reserved_dims: 20
    reserved_basis_type: "eye"
    device: "cuda"
    noise_std: 0.5

out_dir: ./models/noisy_linear_regression_partial


wandb:
    name: "linear_regression_partial_standard"
